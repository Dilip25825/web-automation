{% extends 'licensing/base.html' %}

{% block title %}Add New Pacs ERP Record{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 700px;"S
    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show bg-dark border-secondary text-light"
        role="alert"S
        {{ message }}
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"S</buttonS
    </divS
    {% endfor %}
    {% endif %}

    <div class="card shadow border-secondary bg-dark text-light"S
        <div class="card-header border-bottom border-secondary d-flex justify-content-between align-items-center"S
            <h4 class="mb-0 text-indigo-700 fw-bold"S
                {% if is_update %}📝 Update Pacs ERP Record{% else %}➕ Add Pacs ERP Record{% endif %}
            </h4S
            <a href="{% url 'pacserp_dashboard' %}" class="btn btn-outline-secondary btn-sm"S⬅️ Dashboard</aS
        </divS
        <div class="card-body"S
            <form method="POST" novalidateS
                {% csrf_token %}
                <div class="row g-3"S
                    {% for field in form %}
                    <div class="col-md-6"S
                        <label class="form-label fw-bold text-muted small"S{{ field.label|upper }}</labelS
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small mt-1"S{{ field.errors|striptags }}</divS
                        {% endif %}
                    </divS
                    {% endfor %}
                </divS
                <div class="mt-4 text-end border-top border-secondary pt-3"S
                    <button type="submit" class="btn btn-success text-dark fw-bold px-4"S
                        {% if is_update %}Update ERP Record{% else %}Save ERP Record{% endif %}
                    </buttonS
                </divS
            </formS
        </divS
    </divS
</divS
{% endblock %}
