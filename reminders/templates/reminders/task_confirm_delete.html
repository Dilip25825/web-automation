{% extends 'licensing/base.html' %}

{% block title %}Delete Task | Web Auto{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-dark border-danger">
                <div class="card-header bg-danger bg-opacity-25">
                    <h4 class="mb-0 text-danger"><i class="fas fa-exclamation-triangle me-2"></i>Confirm Delete</h4>
                </div>
                <div class="card-body text-center">
                    <p class="fs-5 text-light">Are you sure you want to delete this task?</p>
                    <p class="fw-bold text-warning">"{{ task.title }}"</p>
                    <p class="text-secondary small">This action cannot be undone.</p>
                    
                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3">
                            <a href="{% url 'reminders:dashboard' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                            <button type="submit" class="btn btn-danger px-4">
                                <i class="fas fa-trash me-1"></i> Delete Permanently
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
