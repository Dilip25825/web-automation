{% extends 'licensing/base.html' %}

{% block title %}Add Category | Web Auto{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-dark border-secondary">
                <div class="card-header bg-secondary bg-opacity-25">
                    <h4 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Add New Category</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label text-light">Category Name <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control bg-dark text-light border-secondary"
                                   placeholder="e.g. Banking, Coding, Client Meeting" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">Icon (FontAwesome)</label>
                            <input type="text" name="icon" class="form-control bg-dark text-light border-secondary"
                                   placeholder="e.g. fa-bank, fa-code, fa-user" value="fa-tag">
                            <div class="form-text text-secondary">
                                <i class="fas fa-circle-question"></i>
                                <a href="https://fontawesome.com/icons" target="_blank" class="text-indigo-700">View all icons</a>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">Color theme</label>
                            <select name="color" class="form-select bg-dark text-light border-secondary">
                                <option value="primary">Primary (Blue)</option>
                                <option value="secondary">Secondary (Gray)</option>
                                <option value="success">Indigo</option>
                                <option value="danger">Danger (Red)</option>
                                <option value="warning">Violet</option>
                                <option value="info">Info (Cyan)</option>
                                <option value="dark">Dark</option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a href="{% url 'reminders:category_list' %}" class="btn btn-outline-secondary"><i class="fa-solid fa-xmark"></i> Cancel</a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save me-1"></i> Create Category
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
