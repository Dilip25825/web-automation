<div class="space-y-4">
  <div><label class="form-label" for="{{ prefix }}-title">Task Title <span class="text-rose-600">*</span></label><input id="{{ prefix }}-title" name="title" maxlength="255" placeholder="What needs to be done?" required></div>
  <div><label class="form-label" for="{{ prefix }}-description">Description <span class="font-normal text-slate-400">(optional)</span></label><textarea id="{{ prefix }}-description" name="description" rows="3" placeholder="Add useful notes or follow-up details"></textarea></div>
  <div class="grid gap-4 sm:grid-cols-2">
    <div><label class="form-label" for="{{ prefix }}-category">Category</label><select id="{{ prefix }}-category" name="category"><option value="">No category</option>{% for c in form.category.field.queryset %}<option value="{{ c.pk }}">{{ c.name }}</option>{% endfor %}</select></div>
    <div><label class="form-label" for="{{ prefix }}-assigned-to">Assigned To</label><select id="{{ prefix }}-assigned-to" name="assigned_to"><option value="">Me</option>{% for user in form.assigned_to.field.queryset %}<option value="{{ user.pk }}">{{ user.username }}</option>{% endfor %}</select></div>
    <div><label class="form-label" for="{{ prefix }}-priority">Priority</label><select id="{{ prefix }}-priority" name="priority">{% for value,label in form.priority.field.choices %}<option value="{{ value }}">{{ label }}</option>{% endfor %}</select></div>
    <div><label class="form-label" for="{{ prefix }}-status">Status</label><select id="{{ prefix }}-status" name="status">{% for value,label in form.status.field.choices %}<option value="{{ value }}">{{ label }}</option>{% endfor %}</select></div>
    <div><label class="form-label" for="{{ prefix }}-deadline">Deadline</label><input id="{{ prefix }}-deadline" type="datetime-local" name="deadline"></div>
    <div><label class="form-label" for="{{ prefix }}-reminder-at">Reminder Time</label><input id="{{ prefix }}-reminder-at" type="datetime-local" name="reminder_at"></div>
  </div>
</div>
