{% extends 'khata/base.html' %}
{% block title %}Edit Grahak - OkCredit{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white fw-bold">Grahak Edit Karein</div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Grahak ka Naam</label>
                        <input type="text" name="name" class="form-control" value="{{ customer.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Phone Number</label>
                        <input type="text" name="phone" class="form-control" value="{{ customer.phone }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Update Karein</button>
                    <a href="{% url 'khata:dashboard' %}" class="btn btn-light w-100 mt-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
