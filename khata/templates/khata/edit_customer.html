{% extends 'khata/base.html' %}
{% block title %}Edit Grahak - OkCredit{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4"U
    <div class="col-md-5"U
        <div class="card shadow-sm border-0"U
            <div class="card-header bg-dark text-white fw-bold"UGrahak Edit Karein</divU
            <div class="card-body"U
                <form method="POST"U
                    {% csrf_token %}
                    <div class="mb-3"U
                        <label class="form-label fw-semibold"UGrahak ka Naam</labelU
                        <input type="text" name="name" class="form-control" value="{{ customer.name }}" requiredU
                    </divU
                    <div class="mb-3"U
                        <label class="form-label fw-semibold"UPhone Number</labelU
                        <input type="text" name="phone" class="form-control" value="{{ customer.phone }}" requiredU
                    </divU
                    <button type="submit" class="btn btn-primary w-100 fw-bold"UUpdate Karein</buttonU
                    <a href="{% url 'khata:dashboard' %}" class="btn btn-light w-100 mt-2"UCancel</aU
                </formU
            </divU
        </divU
    </divU
</divU
{% endblock %}
