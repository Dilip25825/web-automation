{% extends 'khata/base.html' %}
{% block title %}Add Customer{% endblock %}
{% block content %}<div class="mx-auto max-w-xl px-4 py-8"><div class="app-card overflow-hidden"><div class="bg-gradient-to-r from-indigo-600 to-violet-600 px-6 py-5 text-white"><h1 class="text-xl font-extrabold"><i class="fa-solid fa-user-plus mr-2"></i>Add Customer</h1></div><form method="post" class="space-y-4 p-6">{% csrf_token %}<div><label class="form-label">Customer name</label><input name="name" required maxlength="100"></div><div><label class="form-label">Phone number</label><input name="phone" required inputmode="numeric" maxlength="15"></div><div class="flex justify-end gap-2"><a href="{% url 'khata:dashboard' %}" class="btn btn-outline-secondary">Cancel</a><button class="btn btn-primary"><i class="fa-solid fa-save mr-1"></i>Save customer</button></div></form></div></div>{% endblock %}
