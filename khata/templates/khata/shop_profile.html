{% extends 'khata/base.html' %}
{% load static %}

{% block title %}Dukaan Settings - Web Automation{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <!-- Settings Card -->
            <div class="app-card p-4">
                <div class="d-flex align-items-center justify-content-between mb-4">
                    <h4 class="fw-bold text-indigo-700 mb-0">
                        <i class="fa-solid fa-gear me-2 text-violet-600"></i>Shop Settings
                    </h4>
                    <a href="{% url 'khata:dashboard' %}" class="btn btn-outline-primary btn-sm">
                        <i class="fa-solid fa-arrow-left me-1"></i>Dashboard
                    </a>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    
                    <!-- Shop Name -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">
                            <i class="fa-solid fa-store me-1"></i>Shop Name
                        </label>
                        <input type="text" name="shop_name" class="form-control" 
                               value="{{ profile.shop_name }}" placeholder="Enter shop name" required>
                    </div>

                    <!-- Mobile Number -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">
                            <i class="fa-solid fa-phone me-1"></i>Mobile Number
                        </label>
                        <input type="text" name="phone" class="form-control" 
                               value="{{ profile.phone|default:'' }}" placeholder="Optional: Shop mobile number">
                    </div>

                    <!-- Address -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">
                            <i class="fa-solid fa-location-dot me-1"></i>Shop Address
                        </label>
                        <textarea name="address" class="form-control" rows="3" 
                                  placeholder="Optional: Shop address">{{ profile.address|default:'' }}</textarea>
                    </div>

                    <!-- Buttons -->
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-regular fa-floppy-disk me-1"></i>Save Profile
                        </button>
                        <a href="{% url 'khata:dashboard' %}" class="btn btn-outline-secondary">
                            <i class="fa-solid fa-arrow-left me-1"></i>Back to Dashboard
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
