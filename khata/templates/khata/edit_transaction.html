
{% extends 'khata/base.html' %}
{% block title %}Edit Entry - {{ customer.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-light fw-bold">Edit Transection ({{ customer.name }})</div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Date</label>
                        <input type="date" name="date" class="form-control" value="{{ date_formatted }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Amount</label>
                        <input type="number" step="0.01" name="amount" class="form-control" value="{{ trans.amount }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Entry Type</label>
                        <select name="trans_type" class="form-select" required>
                            <option value="GIVEN" {% if trans.trans_type == 'GIVEN' %}selected{% endif %}>Maine Diye (Udhaar)</option>
                            <option value="GOT" {% if trans.trans_type == 'GOT' %}selected{% endif %}>Mujhe Mile (Jama)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Remarks (Optional)</label>
                        <input type="text" name="remarks" class="form-control" value="{{ trans.remarks|default:'' }}">
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold"><i class="fa-solid fa-pen-to-square"></i> Update Entry</button>
                    <a href="{% url 'khata:customer_detail' customer.id %}" class="btn btn-primary w-100 mt-2"><i class="fa-solid fa-xmark"></i> Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
