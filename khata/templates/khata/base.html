{% extends 'core/base.html' %}

{% block extra_js %}
<div id="khata-loading-overlay" class="fixed inset-0 z-[100] hidden items-center justify-center bg-slate-950/45 p-4 backdrop-blur-sm" role="status" aria-live="polite" aria-hidden="true">
  <div class="flex min-w-56 flex-col items-center rounded-2xl bg-white px-8 py-7 text-center shadow-2xl">
    <span class="h-12 w-12 animate-spin rounded-full border-4 border-indigo-100 border-t-indigo-600"></span>
    <p id="khata-loading-text" class="mt-4 font-extrabold text-slate-800">Saving changes...</p>
    <p class="mt-1 text-xs text-slate-500">Please wait</p>
  </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {
 const app=()=>document.getElementById('khata-app'),overlay=document.getElementById('khata-loading-overlay'),loadingText=document.getElementById('khata-loading-text');
 const loading=(show,text='Saving changes...')=>{if(!overlay)return;loadingText.textContent=text;overlay.classList.toggle('hidden',!show);overlay.classList.toggle('flex',show);overlay.setAttribute('aria-hidden',show?'false':'true')};
 const toast=(icon,title)=>Swal.fire({toast:true,position:'top-end',icon,title,showConfirmButton:false,timer:2200,timerProgressBar:true});
 const calculateInterest=()=>{const principal=document.getElementById('principalAmt'),rate=document.getElementById('interestRate'),months=document.getElementById('interestMonths'),from=document.getElementById('interestFromDate'),to=document.getElementById('interestDate'),total=document.getElementById('totalInterest');if(!total)return;let monthValue=parseFloat(months?.value)||0;if(from?.value&&to?.value){monthValue=Math.max(0,(new Date(to.value)-new Date(from.value))/86400000)/30;if(months)months.value=monthValue.toFixed(2)}const value=((parseFloat(principal?.value)||0)*(parseFloat(rate?.value)||0)*monthValue)/100;total.value=value.toFixed(2);const preview=document.getElementById('totalInterestPreview');if(preview)preview.textContent=value.toFixed(2)};
 const initialize=()=>{const transferDate=document.getElementById('transferDate');if(transferDate&&!transferDate.value)transferDate.value=new Date().toLocaleDateString('en-CA');calculateInterest()};
 const refresh=async(url=window.location.href)=>{const response=await fetch(url,{headers:{'X-Requested-With':'XMLHttpRequest'},credentials:'same-origin'});if(!response.ok)throw new Error('Updated Khata data could not be loaded.');const page=new DOMParser().parseFromString(await response.text(),'text/html'),fresh=page.getElementById('khata-app');if(!fresh)throw new Error('Updated Khata section was not found.');app().innerHTML=fresh.innerHTML;initialize()};
 document.addEventListener('click',event=>{const root=app();if(!root||!root.contains(event.target))return;const toggle=event.target.closest('[data-bs-toggle="modal"]');if(toggle){const modal=document.querySelector(toggle.dataset.bsTarget);if(modal){modal.classList.add('is-open');modal.dispatchEvent(new Event('shown.bs.modal'));if(toggle.dataset.bsTarget==='#interestModal')calculateInterest()}}const dismiss=event.target.closest('[data-bs-dismiss="modal"]');if(dismiss) dismiss.closest('.modal')?.classList.remove('is-open');const customer=event.target.closest('[data-edit-customer]');if(customer){document.getElementById('editCustomerForm').action=customer.dataset.updateUrl;document.getElementById('editCustomerName').value=customer.dataset.customerName;document.getElementById('editCustomerPhone').value=customer.dataset.customerPhone}const transaction=event.target.closest('[data-edit-transaction]');if(transaction){document.getElementById('editTransactionForm').action=transaction.dataset.updateUrl;document.getElementById('editTransactionDate').value=transaction.dataset.date;document.getElementById('editTransactionAmount').value=transaction.dataset.amount;document.getElementById('editTransactionType').value=transaction.dataset.type;document.getElementById('editTransactionRemarks').value=transaction.dataset.remarks}});
 document.addEventListener('input',event=>{if(['principalAmt','interestRate','interestMonths'].includes(event.target.id))calculateInterest()});document.addEventListener('change',event=>{if(['interestFromDate','interestDate'].includes(event.target.id))calculateInterest()});
 document.addEventListener('submit',async event=>{const form=event.target.closest('[data-khata-ajax-form]');if(!form||!app()?.contains(form))return;event.preventDefault();if(form.id==='transferVoucherForm'){const from=document.getElementById('fromCustomer'),to=document.getElementById('toCustomer'),same=from?.value&&from.value===to?.value;document.getElementById('transferError')?.classList.toggle('hidden',!same);if(same)return}if(form.hasAttribute('data-ajax-confirm-delete')){const answer=await Swal.fire({title:form.dataset.title||'Delete this item?',text:form.dataset.text||'This action cannot be undone.',icon:'warning',showCancelButton:true,confirmButtonText:'Yes, delete',confirmButtonColor:'#e11d48',cancelButtonText:'Cancel'});if(!answer.isConfirmed)return}loading(true,form.dataset.loadingText||'Saving changes...');try{const response=await fetch(form.action,{method:'POST',body:new FormData(form),headers:{'X-Requested-With':'XMLHttpRequest'},credentials:'same-origin'}),type=response.headers.get('content-type')||'';if(!type.includes('application/json'))throw new Error('Your session may have expired. Please sign in again.');const result=await response.json();if(!response.ok||!result.success)throw new Error((result.errors||[]).join('\n')||result.message||'Action failed.');await refresh();toast('success',result.message)}catch(error){Swal.fire({icon:'error',title:'Action failed',text:error.message})}finally{loading(false)}});
 document.addEventListener('submit',async event=>{const form=event.target.closest('[data-khata-nav-form]');if(!form||!app()?.contains(form))return;event.preventDefault();const url=new URL(form.action||window.location.href,window.location.href),data=new FormData(form);url.search=new URLSearchParams(data).toString();loading(true,'Loading data...');try{await refresh(url.href);history.pushState({},'',url.href)}catch(error){Swal.fire({icon:'error',title:'Loading failed',text:error.message})}finally{loading(false)}});
 window.addEventListener('popstate',async()=>{if(!app())return;loading(true,'Loading data...');try{await refresh()}finally{loading(false)}});initialize();
});
</script>
{% endblock %}
