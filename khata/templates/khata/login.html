{% extends 'khata/base.html' %}

{% block title %}Login - OkCredit{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5 bg">
    <div class="col-md-5">
        <div class="card shadow border-0">
            <div class="card-header bg-success text-white text-center py-3">
                <h4 class="mb-0 fw-bold">Web Automation With Excel Login</h4>
            </div>
            <div class="card-body p-4">
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold mt-2">Login</button>
                </form>
                
            </div>
        </div>
    </div>
</div>


{% endblock %}
