{% extends 'khata/base.html' %}

{% block title %}Login - OkCredit{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5 bg"L
    <div class="col-md-5"L
        <div class="card shadow border-0"L
            <div class="card-header bg-primary text-white text-center py-3"L
                <h4 class="mb-0 fw-bold"LWeb Automation With Excel Login</h4L
            </divL
            <div class="card-body p-4"L
                
                <form method="POST"L
                    {% csrf_token %}
                    <div class="mb-3"L
                        <label class="form-label fw-semibold"LUsername</labelL
                        <input type="text" name="username" class="form-control" placeholder="Enter Username" requiredL
                    </divL
                    <div class="mb-3"L
                        <label class="form-label fw-semibold"LPassword</labelL
                        <input type="password" name="password" class="form-control" placeholder="Enter Password" requiredL
                    </divL
                    <button type="submit" class="btn btn-success w-100 fw-bold mt-2"LLogin</buttonL
                </formL
                
            </divL
        </divL
    </divL
</divL


{% endblock %}
