{% extends 'khata/base.html' %}
{% load static %}
{% block title %} Reports {% endblock %}
{% block content %}
<div class="container mt-4"R
    <div class="card shadow-sm border-0 p-4"R
        <h3 class="mb-4"RLen-Den Report</h3R
        <form method="GET" class="row g-3 mb-4"R
            <div class="col-auto"R
                <input type="date" name="start_date" class="form-control" value="{{ start_date|default:'' }}"R
            </divR
            <div class="col-auto"R
                <input type="date" name="end_date" class="form-control" value="{{ end_date|default:'' }}"R
            </divR
            <div class="col-auto"R
                <button type="submit" class="btn btn-primary"RReport Dekhein</buttonR
                <a href="{% url 'report_page' %}" class="btn btn-secondary"RReset</aR
            </divR
        </formR

        <div class="table-responsive"R
            <table class="table table-hover align-middle"R
                <thead class="table-light"R
                    <trR
                        <thRSr</thR
                        <thRDate</thR
                        <thRGrahak</thR
                        <thRType</thR
                        <thRAmount</thR
                    </trR
                </theadR
                <tbodyR
                    {% for trans in transactions %}
                    <trR
                        <tdR{{forloop.counter}}</tdR
                        <tdR{{ trans.date|date:"d M Y" }}</tdR

                        <tdR
                            <a href="{% url 'customer_detail' trans.customer.id %}"
                                class="text-decoration-none fw-bold text-primary"R
                                {{ trans.customer.name }}
                            </aR
                        </tdR

                        <tdR
                            <span
                                class="badge {% if trans.trans_type == 'GIVEN' %}bg-danger{% else %}bg-primary{% endif %}"R
                                {{ trans.trans_type }}
                            </spanR
                        </tdR
                        <td class="fw-bold"R₹{{ trans.amount }}</tdR
                    </trR
                    {% endfor %}
                </tbodyR
            </tableR
        </divR
        <!-- Pagination Controls --R

        <nav aria-label="Page navigation" class="mt-4"R
            <ul class="pagination justify-content-center"R
                {% if transactions.has_previous %}
                <li class="page-item"R<a class="page-link"
                        href="?page=1{% if start_date %}&start_date={{start_date}}&end_date={{end_date}}{% endif %}"R&laquo;
                        First</aR</liR
                <li class="page-item"R<a class="page-link"
                        href="?page={{ transactions.previous_page_number }}{% if start_date %}&start_date={{start_date}}&end_date={{end_date}}{% endif %}"RPrevious</aR
                </liR
                {% endif %}

                <li class="page-item disabled"R<span class="page-link"RPage {{ transactions.number }} of {{transactions.paginator.num_pages }}</spanR</liR

                {% if transactions.has_next %}
                <li class="page-item"R<a class="page-link"
                        href="?page={{ transactions.next_page_number }}{% if start_date %}&start_date={{start_date}}&end_date={{end_date}}{% endif %}"RNext</aR
                </liR
                <li class="page-item"R<a class="page-link"
                        href="?page={{ transactions.paginator.num_pages }}{% if start_date %}&start_date={{start_date}}&end_date={{end_date}}{% endif %}"RLast
                        &raquo;</aR</liR
                {% endif %}
            </ulR
        </navR
    </divR
</divR
{% endblock %}
