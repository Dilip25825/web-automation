<div><label class="form-label" for="{{ prefix }}-name">Software name</label><input id="{{ prefix }}-name" name="name" required></div><div><label class="form-label" for="{{ prefix }}-description">Description</label><textarea id="{{ prefix }}-description" name="description" rows="3"></textarea></div><div><label class="form-label" for="{{ prefix }}-category">Category</label><select id="{{ prefix }}-category" name="category" required><option value="">Select category</option>{% for category in categories %}<option value="{{ category.name }}" {% if category.name == 'General' and prefix == 'new-link' %}selected{% endif %}>{{ category.name }}</option>{% endfor %}</select></div><div><label class="form-label" for="{{ prefix }}-drive-link">Google Drive link</label><input id="{{ prefix }}-drive-link" type="url" name="drive_link" required placeholder="https://drive.google.com/..."></div><label class="flex items-center gap-2 text-sm font-bold text-slate-700" for="{{ prefix }}-is-active"><input id="{{ prefix }}-is-active" type="checkbox" name="is_active" value="on" {% if prefix == 'new-link' %}checked{% endif %}>Active link</label>
