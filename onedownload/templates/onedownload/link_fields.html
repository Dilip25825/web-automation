<div><label class="form-label" for="{{ prefix }}-name">Software name</label><input id="{{ prefix }}-name" name="name" required></div>
<div><label class="form-label" for="{{ prefix }}-description">Description</label><textarea id="{{ prefix }}-description" name="description" rows="3"></textarea></div>
<fieldset><legend class="form-label">Categories</legend><p class="mb-3 text-xs text-slate-500">Ek ya ek se zyada categories select kar sakte hain.</p><div class="grid gap-2 sm:grid-cols-2">{% for category in categories %}<label class="flex cursor-pointer items-center gap-3 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm font-semibold text-slate-700 transition hover:border-indigo-200 hover:bg-indigo-50"><input id="{{ prefix }}-category-{{ category.pk }}" type="checkbox" name="categories" value="{{ category.pk }}" data-category-checkbox="{{ prefix }}" {% if prefix == 'new-link' and category.name == 'General' %}checked{% endif %}><i class="{{ category.icon_class }} text-indigo-600"></i>{{ category.name }}</label>{% endfor %}</div></fieldset>
<div><label class="form-label" for="{{ prefix }}-drive-link">Google Drive link</label><input id="{{ prefix }}-drive-link" type="url" name="drive_link" required placeholder="https://drive.google.com/..."></div>
<div class="grid gap-3 sm:grid-cols-2"><label class="flex items-center gap-3 rounded-xl border border-amber-200 bg-amber-50 p-3 text-sm font-bold text-amber-900" for="{{ prefix }}-is-required"><input id="{{ prefix }}-is-required" type="checkbox" name="is_required" value="on">Required for all software</label><label class="flex items-center gap-3 rounded-xl border border-emerald-200 bg-emerald-50 p-3 text-sm font-bold text-emerald-900" for="{{ prefix }}-is-active"><input id="{{ prefix }}-is-active" type="checkbox" name="is_active" value="on" {% if prefix == 'new-link' %}checked{% endif %}>Active link</label></div>
